, "color": "#0a8f3c"}, {"lat": 35.6618, "lon": 139.6988, "n": 6, "name": "渋谷モディ（MODI）", "cat": "", "intro": "神南 fashion bldg，中價 brand＋雜貨＋書店。", "info": "11:00–21:00 ⟨用前核⟩ · ¥3,000–15,000", "naver": "https://www.google.com/maps/search/%E6%B8%8B%E8%B0%B7%E3%83%A2%E3%83%87%E3%82%A3", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6615, "lon": 139.6985, "n": 7, "name": "GLOBAL WORK 渋谷", "cat": "", "intro": "Adastria 系（同 RAGEBLUE 集團）平價 daily casual，超值、必行。", "info": "約11:00–21:00 ⟨用前核⟩ · ¥2,000–8,000", "naver": "https://www.google.com/maps/search/%E3%82%B0%E3%83%AD%E3%83%BC%E3%83%90%E3%83%AB%E3%83%AF%E3%83%BC%E3%82%AF%20%E6%B8%8B%E8%B0%B7", "meal": false, "opt": false, "color": "#0a8f3c"}, {"lat": 35.6618, "lon": 139.698, "n": 8, "name": "BEAMS 渋谷", "cat": "", "intro": "men's 特化，1F original（同你級數）、2F select。", "info": "11:00–20:00 ⟨用前核⟩ · ¥5,000–20,000", "naver": "https://www.google.com/maps/search/%E3%83%93%E3%83%BC%E3%83%A0%E3%82%B9%20%E6%B8%8B%E8%B0%B7", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.662, "lon": 139.6982, "n": 9, "name": "nano・universe 渋谷神南", "cat": "", "intro": "kireime casual 中價，1F／B1 men's，貼你級數略高。", "info": "12:00–20:00 [verified 2026-06] · ¥6,000–18,000", "naver": "https://www.google.com/maps/search/%E3%83%8A%E3%83%8E%E3%83%BB%E3%83%A6%E3%83%8B%E3%83%90%E3%83%BC%E3%82%B9%20%E6%B8%8B%E8%B0%B7%E7%A5%9E%E5%8D%97", "meal": false, "opt": false, "color": "#0a8f3c"}, {"lat": 35.6627, "lon": 139.6976, "n": 10, "name": "渋谷PARCO 6F サブカル聖地〔角色〕", "cat": "角色", "intro": "Nintendo TOKYO・ポケモンセンター・JUMP SHOP・CAPCOM STORE 同層，切合你 hobby 的重點站。", "info": "10:00–21:00 [verified 2026-06] · ¥500–8,000", "naver": "https://www.google.com/maps/search/%E6%B8%8B%E8%B0%B7PARCO%206F%20Nintendo%20Pokemon%20JumpShop%20Capcom", "meal": false, "opt": false, "color": "#0a8f3c"}, {"lat": 35.6627, "lon": 139.6975, "n": 11, "name": "渋谷PARCO（2–5F 服）", "cat": "", "intro": "一棟逛齊：vintage／韓系／street 多元，選同你級數樓層。", "info": "11:00–21:00 [verified 2026-06] · ¥5,000–30,000", "naver": "https://www.google.com/maps/search/%E6%B8%8B%E8%B0%B7PARCO", "meal": false, "opt": false, "color": "#0a8f3c"}], "paths": [[[35.6628, 139.6985], [35.6624, 139.6986], [35.6622, 139.6984], [35.6621, 139.6983], [35.6619, 139.6986], [35.6618, 139.6988], [35.6615, 139.6985], [35.6618, 139.698], [35.662, 139.6982], [35.6627, 139.6976], [35.6627, 139.6975]]], "links": [], "streets": [{"zh": "原宿駅", "lat": 35.6702, "lon": 139.7027}, {"zh": "竹下通り", "lat": 35.6714, "lon": 139.7045}, {"zh": "ラフォーレ", "lat": 35.6695, "lon": 139.7065}, {"zh": "キャットストリート", "lat": 35.6672, "lon": 139.7042}, {"zh": "渋谷・神南", "lat": 35.6623, "lon": 139.6984}, {"zh": "渋谷PARCO", "lat": 35.6627, "lon": 139.6975}, {"zh": "センター街", "lat": 35.6602, "lon": 139.6978}, {"zh": "道玄坂", "lat": 35.6585, "lon": 139.6968}, {"zh": "渋谷駅", "lat": 35.658, "lon": 139.7016}, {"zh": "宮益坂", "lat": 35.6595, "lon": 139.7028}]};

const map=L.map('map',{zoomControl:true}).setView([35.662172727272726, 139.69827272727272],16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const all=[];
function draw(p){if(p.length<2)return;L.polyline(p,{color:'#fff',weight:8,opacity:.95,lineCap:'round'}).addTo(map);
 const pl=L.polyline(p,{color:'#E4002B',weight:4.5,opacity:1,lineCap:'round'}).addTo(map);
 if(L.Symbol&&L.polylineDecorator){L.polylineDecorator(pl,{patterns:[{offset:14,repeat:60,symbol:L.Symbol.arrowHead({pixelSize:12,headAngle:50,polygon:true,pathOptions:{fill:true,fillColor:'#fff',fillOpacity:1,color:'#E4002B',weight:1.5}})}]}).addTo(map);}}
(D.paths||[]).forEach(draw);
(D.links||[]).forEach(l=>{L.polyline(l.pts,{color:'#fff',weight:7,opacity:.9,lineCap:'round'}).addTo(map);
 L.polyline(l.pts,{color:'#13395c',weight:4,opacity:1,dashArray:'3,9',lineCap:'round'}).addTo(map);
 l.pts.forEach(p=>all.push(p));
 if(l.label){const m=[(l.pts[0][0]+l.pts[1][0])/2,(l.pts[0][1]+l.pts[1][1])/2];
  L.marker(m,{icon:L.divIcon({className:'',html:`<div class="tl">🚃 ${l.label}</div>`,iconSize:[160,18],iconAnchor:[80,9]}),interactive:false,zIndexOffset:-150}).addTo(map);}});
D.stops.forEach(s=>{const ll=[s.lat,s.lon];all.push(ll);
 const cls=s.meal?'pin meal':('pin'+(s.opt?' opt':''));
 const stylv=s.meal?'':(s.opt?`border-color:${s.color};color:${s.color}`:`background:${s.color}`);
 const ic=L.divIcon({className:'',html:`<div class="${cls}" style="${stylv}">${s.n}</div>`,iconSize:[27,27],iconAnchor:[13,13]});
 const navlbl="Google \u5c0e\u822a";
 const nav=s.naver?`<div style="margin-top:4px"><a href="${s.naver}" target="_blank" rel="noopener">${navlbl} ↗</a></div>`:'';
 L.marker(ll,{icon:ic}).addTo(map).bindPopup(`<b>${s.n}. ${s.name}</b>`+(s.cat?`<div class="cat">${s.cat}</div>`:'')+(s.intro?`<div class="sum">${s.intro}</div>`:'')+(s.info?`<div class="i">${s.info}</div>`:'')+nav,{maxWidth:262});});
(D.streets||[]).forEach(st=>L.marker([st.lat,st.lon],{icon:L.divIcon({className:'',html:`<div class="st">${st.zh}</div>`,iconSize:[88,16],iconAnchor:[44,8]}),interactive:false,zIndexOffset:-200}).addTo(map));

function meIcon(h){var inner=(h==null)?'<div class="medot"></div>':'<div class="mecone" style="transform:rotate('+h+'deg)"></div><div class="medot"></div>';
 return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],html:'<div class="mepos">'+inner+'</div>'});}
function meRender(){if(!meLL)return;if(meM)map.removeLayer(meM);meM=L.marker(meLL,{icon:meIcon(hd),zIndexOffset:1000,interactive:false}).addTo(map);}
function onOri(e){var h=(e.webkitCompassHeading!=null)?e.webkitCompassHeading:((e.absolute&&e.alpha!=null)?(360-e.alpha):null);if(h!=null){hd=h;meRender();}}
document.getElementById('loc').onclick=function(){
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
  DeviceOrientationEvent.requestPermission().then(function(p){if(p==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});}
 else if(window.DeviceOrientationEvent){window.addEventListener('deviceorientationabsolute',onOri,true);window.addEventListener('deviceorientation',onOri,true);}
 if(!navigator.geolocation){alert('此裝置不支援定位');return;}
 if(!watching){watching=true;
  navigator.geolocation.watchPosition(function(p){meLL=[p.coords.latitude,p.coords.longitude];

   if(!meM)map.setView(meLL,16);meRender();},
   function(){alert('無法定位：請在 Safari 允許位置權限');},{enableHighAccuracy:true,maximumAge:1000,timeout:12000});}
 else if(meLL){map.setView(meLL,16);}};
