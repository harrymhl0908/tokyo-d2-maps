const map=L.map('map',{zoomControl:true}).setView([35.659773333333334, 139.69829333333334],16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const all=[];
function draw(p){if(p.length<2)return;L.polyline(p,{color:'#fff',weight:8,opacity:.95,lineCap:'round'}).addTo(map);
 const pl=L.polyline(p,{color:'#E4002B',weight:4.5,opacity:1,lineCap:'round'}).addTo(map);
 }
(D.paths||[]).forEach(draw);
(D.links||[]).forEach(l=>{L.polyline(l.pts,{color:'#fff',weight:7,opacity:.9,lineCap:'round'}).addTo(map);
 L.polyline(l.pts,{color:'#13395c',weight:4,opacity:1,dashArray:'3,9',lineCap:'round'}).addTo(map);
 l.pts.forEach(p=>all.push(p));
 if(l.label){const m=[(l.pts[0][0]+l.pts[1][0])/2,(l.pts[0][1]+l.pts[1][1])/2];
  L.marker(m,{icon:L.divIcon({className:'',html:`<div class="tl">🚃 ${l.label}</div>`,iconSize:[160,18],iconAnchor:[80,9]}),interactive:false,zIndexOffset:-150}).addTo(map);}});
D.stops.forEach(s=>{const ll=[s.lat,s.lon];all.push(ll);
 const cls=s.meal?'pin meal':('pin'+(s.opt?' opt':''));
 const stylv=s.meal?'':(s.opt?`border-color:${s.color};color:${s.color}`:`background:${s.color}`);
 const ic=L.divIcon({className:'',html:`<div class="${cls}" style="${stylv}">${s.n}</div>`,iconSize:[27,27],iconAnchor:[13,13]});
 const navlbl="Google \u5c0e\u822a";
 const nav=s.naver?`<div style="margin-top:4px"><a href="${s.naver}" target="_blank" rel="noopener">${navlbl} ↗</a></div>`:'';
 L.marker(ll,{icon:ic}).addTo(map).bindPopup(`<b>${s.n}. ${s.name}</b>`+(s.cat?`<div class="cat">${s.cat}</div>`:'')+(s.intro?`<div class="sum">${s.intro}</div>`:'')+(s.info?`<div class="i">${s.info}</div>`:'')+nav,{maxWidth:262});});
(D.streets||[]).forEach(st=>L.marker([st.lat,st.lon],{icon:L.divIcon({className:'',html:`<div class="st">${st.zh}</div>`,iconSize:[88,16],iconAnchor:[44,8]}),interactive:false,zIndexOffset:-200}).addTo(map));

var meM=null,meLL=null,hd=null,watching=false;
function meIcon(h){var inner=(h==null)?'<div class="medot"></div>':'<div class="mecone" style="transform:rotate('+h+'deg)"></div><div class="medot"></div>';
 return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],html:'<div class="mepos">'+inner+'</div>'});}
function meRender(){if(!meLL)return;if(meM)map.removeLayer(meM);meM=L.marker(meLL,{icon:meIcon(hd),zIndexOffset:1000,interactive:false}).addTo(map);}
function onOri(e){var h=(e.webkitCompassHeading!=null)?e.webkitCompassHeading:((e.absolute&&e.alpha!=null)?(360-e.alpha):null);if(h!=null){hd=h;meRender();}}
document.getElementById('loc').onclick=function(){
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
  DeviceOrientationEvent.requestPermission().then(function(p){if(p==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});}
 else if(window.DeviceOrientationEvent){window.addEventListener('deviceorientationabsolute',onOri,true);window.addEventListener('deviceorientation',onOri,true);}
 if(!navigator.geolocation){alert('此裝置不支援定位');return;}
 if(!watching){watching=true;
  navigator.geolocation.watchPosition(function(p){meLL=[p.coords.latitude,p.coords.longitude];
   if(hd==null&&p.coords.heading!=null&&!isNaN(p.coords.heading))hd=p.coords.heading;
   if(!meM)map.setView(meLL,16);meRender();},
   function(){alert('無法定位：請在 Safari 允許位置權限');},{enableHighAccuracy:true,maximumAge:1000,timeout:12000});}
 else if(meLL){map.setView(meLL,16);}};
