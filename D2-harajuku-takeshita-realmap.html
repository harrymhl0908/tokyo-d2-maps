<script>
const D={"title": "Tokyo Solo Trip · D2-harajuku-takeshita 實景動線地圖", "sub": "由原宿駅起，竹下口入竹下通行平價（WEGO 1.3.5／ANAP）＋扭蛋（#C-pla＋／ガチャの森，切合你 hobby）；回明治通方向逛大箱古着（シカゴ ¥500 起／KINJI 2万点／SPINNS），WEGO 原宿本店作基地，ラフォーレ 看中價樓層，ハラカド 下雨備案＋晚餐後備。", "stops": [{"lat": 35.6714, "lon": 139.7044, "n": 1, "name": "#C-pla＋ 原宿竹下通店〔ガチャ〕", "cat": "", "intro": "竹下通超大型扭蛋，2層、1,000台以上，切合你 hobby。", "info": "約10:00–21:00 ⟨用前核⟩ · ¥300／回 起", "naver": "https://www.google.com/maps/search/%23C-pla%EF%BC%8B%20%E5%8E%9F%E5%AE%BF%E7%AB%B9%E4%B8%8B%E9%80%9A%E3%82%8A%E5%BA%97", "meal": false, "opt": false, "color": "#8a2be2"}, {"lat": 35.6715, "lon": 139.7045, "n": 2, "name": "WEGO 1.3.5… 竹下通店", "cat": "", "intro": "竹下通最平 USED／福袋系，原宿駅竹下口徒歩約4分。", "info": "約10:30–20:00 ⟨用前核⟩ · ¥700–3,000", "naver": "https://www.google.com/maps/search/WEGO%201.3.5%E2%80%A6%20%E5%8E%9F%E5%AE%BF%E7%AB%B9%E4%B8%8B%E9%80%9A%E5%BA%97", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6716, "lon": 139.7048, "n": 3, "name": "ANAP 原宿竹下通店", "cat": "", "intro": "10–20代 original brand，平價個性款，搭著玩。", "info": "約11:00–20:00 ⟨用前核⟩ · ¥2,000–6,000", "naver": "https://www.google.com/maps/search/ANAP%20%E5%8E%9F%E5%AE%BF%E7%AB%B9%E4%B8%8B%E9%80%9A%E3%82%8A%E5%BA%97", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6716, "lon": 139.705, "n": 4, "name": "ガチャガチャの森 原宿アルタ店〔ガチャ〕", "cat": "", "intro": "竹下通扭蛋專門大店，主題機多。", "info": "約10:00–21:00 ⟨用前核⟩ · ¥300／回 起", "naver": "https://www.google.com/maps/search/%E3%82%AC%E3%83%81%E3%83%A3%E3%82%AC%E3%83%81%E3%83%A3%E3%81%AE%E6%A3%AE%20%E5%8E%9F%E5%AE%BF%E3%82%A2%E3%83%AB%E3%82%BF%E5%BA%97", "meal": false, "opt": true, "color": "#8a2be2"}, {"lat": 35.6708, "lon": 139.7055, "n": 5, "name": "SPINNS 原宿〔古著〕", "cat": "古著", "intro": "明治通沿、原宿系平價古着＋鞋＋配件，CP 高。", "info": "約11:00–20:00 ⟨用前核⟩ · ¥1,000–5,000", "naver": "https://www.google.com/maps/search/%E3%82%B9%E3%83%94%E3%83%B3%E3%82%BA%20%E5%8E%9F%E5%AE%BF%E5%BA%97", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6707, "lon": 139.7052, "n": 6, "name": "KINJI 原宿〔古著〕", "cat": "古著", "intro": "明治通 YM スクエア B1，常時2万点以上、安い古着大箱，慢慢選有好物。", "info": "約11:00–20:00 ⟨用前核⟩ · ¥1,500–6,000", "naver": "https://www.google.com/maps/search/%E3%82%AD%E3%83%B3%E3%82%B8%20%E5%8E%9F%E5%AE%BF%E5%BA%97", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.671, "lon": 139.705, "n": 7, "name": "原宿シカゴ 神宮前店〔古著〕", "cat": "古著", "intro": "古着名店，店頭 ¥500 起、中心 ¥2,000–3,000，量大 CP 最強，含美式／和服。", "info": "11:00–20:00 [verified 2026-06] · ¥500–3,000", "naver": "https://www.google.com/maps/search/%E5%8E%9F%E5%AE%BF%E3%82%B7%E3%82%AB%E3%82%B4%20%E7%A5%9E%E5%AE%AE%E5%89%8D%E5%BA%97", "meal": false, "opt": false, "color": "#0a8f3c"}, {"lat": 35.6705, "lon": 139.7038, "n": 8, "name": "WEGO 原宿本店", "cat": "", "intro": "平價休閒＋USED 混合，原宿系入門最划算，graphic tee 多，RAGEBLUE 帶以下打底好用。", "info": "10:30–20:00 [verified 2026-06] · ¥1,000–4,000", "naver": "https://www.google.com/maps/search/WEGO%20%E5%8E%9F%E5%AE%BF%E6%9C%AC%E5%BA%97", "meal": false, "opt": false, "color": "#0a8f3c"}, {"lat": 35.67, "lon": 139.7028, "n": 9, "name": "WITH HARAJUKU（and ST TOKYO 1F）", "cat": "", "intro": "原宿駅前複合，1F and ST TOKYO 時尚 pop-up；下雨備案。", "info": "平日11:00–21:00 [verified 2026-06] · ¥數百–數千", "naver": "https://www.google.com/maps/search/and%20ST%20TOKYO%20WITH%20HARAJUKU", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6692, "lon": 139.703, "n": 10, "name": "ハラカド（東急プラザ原宿）", "cat": "", "intro": "2024 新複合，B1 小杉湯 café、屋上展望、5–7F 食堂街可晚餐後備。", "info": "11:00–21:00／餐–23:00 [verified 2026-06] · ¥1,000 起", "naver": "https://www.google.com/maps/search/%E6%9D%B1%E6%80%A5%E3%83%97%E3%83%A9%E3%82%B6%E5%8E%9F%E5%AE%BF%20%E3%83%8F%E3%83%A9%E3%82%AB%E3%83%89", "meal": false, "opt": true, "color": "#0a8f3c"}, {"lat": 35.6695, "lon": 139.7065, "n": 11, "name": "ラフォーレ原宿", "cat": "", "intro": "原宿地標 fashion bldg，中價–潮牌混合（高端樓層可略過）。", "info": "11:00–20:00 [verified 2026-06] · ¥3,000–20,000", "naver": "https://www.google.com/maps/search/%E3%83%A9%E3%83%95%E3%82%A9%E3%83%BC%E3%83%AC%E5%8E%9F%E5%AE%BF", "meal": false, "opt": true, "color": "#0a8f3c"}], "paths": [[[35.6714, 139.7044], [35.6715, 139.7045], [35.6716, 139.7048], [35.6716, 139.705], [35.6708, 139.7055], [35.6707, 139.7052], [35.671, 139.705], [35.6705, 139.7038], [35.67, 139.7028], [35.6692, 139.703], [35.6695, 139.7065]]], "links": [], "streets": [{"zh": "原宿駅", "lat": 35.6702, "lon": 139.7027}, {"zh": "竹下通り", "lat": 35.6714, "lon": 139.7045}, {"zh": "ラフォーレ", "lat": 35.6695, "lon": 139.7065}, {"zh": "キャットストリート", "lat": 35.6672, "lon": 139.7042}, {"zh": "渋谷・神南", "lat": 35.6623, "lon": 139.6984}, {"zh": "渋谷PARCO", "lat": 35.6627, "lon": 139.6975}, {"zh": "センター街", "lat": 35.6602, "lon": 139.6978}, {"zh": "道玄坂", "lat": 35.6585, "lon": 139.6968}, {"zh": "渋谷駅", "lat": 35.658, "lon": 139.7016}, {"zh": "宮益坂", "lat": 35.6595, "lon": 139.7028}]};
document.getElementById('t').textContent=D.title;document.getElementById('s').textContent=D.sub;
const map=L.map('map',{zoomControl:true}).setView([35.67070909090909, 139.7045909090909],16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
const all=[];
function draw(p){if(p.length<2)return;L.polyline(p,{color:'#fff',weight:8,opacity:.95,lineCap:'round'}).addTo(map);
 const pl=L.polyline(p,{color:'#E4002B',weight:4.5,opacity:1,lineCap:'round'}).addTo(map);
 }
(D.paths||[]).forEach(draw);
(D.links||[]).forEach(l=>{L.polyline(l.pts,{color:'#fff',weight:7,opacity:.9,lineCap:'round'}).addTo(map);
 L.polyline(l.pts,{color:'#13395c',weight:4,opacity:1,dashArray:'3,9',lineCap:'round'}).addTo(map);
 l.pts.forEach(p=>all.push(p));
 if(l.label){const m=[(l.pts[0][0]+l.pts[1][0])/2,(l.pts[0][1]+l.pts[1][1])/2];
  L.marker(m,{icon:L.divIcon({className:'',html:`<div class="tl">🚃 ${l.label}</div>`,iconSize:[160,18],iconAnchor:[80,9]}),interactive:false,zIndexOffset:-150}).addTo(map);}});
D.stops.forEach(s=>{const ll=[s.lat,s.lon];all.push(ll);
 const cls=s.meal?'pin meal':('pin'+(s.opt?' opt':''));
 const stylv=s.meal?'':(s.opt?`border-color:${s.color};color:${s.color}`:`background:${s.color}`);
 const ic=L.divIcon({className:'',html:`<div class="${cls}" style="${stylv}">${s.n}</div>`,iconSize:[27,27],iconAnchor:[13,13]});
 const navlbl="Google \u5c0e\u822a";
 const nav=s.naver?`<div style="margin-top:4px"><a href="${s.naver}" target="_blank" rel="noopener">${navlbl} ↗</a></div>`:'';
 L.marker(ll,{icon:ic}).addTo(map).bindPopup(`<b>${s.n}. ${s.name}</b>`+(s.cat?`<div class="cat">${s.cat}</div>`:'')+(s.intro?`<div class="sum">${s.intro}</div>`:'')+(s.info?`<div class="i">${s.info}</div>`:'')+nav,{maxWidth:262});});
(D.streets||[]).forEach(st=>L.marker([st.lat,st.lon],{icon:L.divIcon({className:'',html:`<div class="st">${st.zh}</div>`,iconSize:[88,16],iconAnchor:[44,8]}),interactive:false,zIndexOffset:-200}).addTo(map));
if(all.length)map.fitBounds(L.latLngBounds(all).pad(0.15));
var meM=null,meLL=null,hd=null,watching=false;
function meIcon(h){var inner=(h==null)?'<div class="medot"></div>':'<div class="mecone" style="transform:rotate('+h+'deg)"></div><div class="medot"></div>';
 return L.divIcon({className:'',iconSize:[30,30],iconAnchor:[15,15],html:'<div class="mepos">'+inner+'</div>'});}
function meRender(){if(!meLL)return;if(meM)map.removeLayer(meM);meM=L.marker(meLL,{icon:meIcon(hd),zIndexOffset:1000,interactive:false}).addTo(map);}
function onOri(e){var h=(e.webkitCompassHeading!=null)?e.webkitCompassHeading:((e.absolute&&e.alpha!=null)?(360-e.alpha):null);if(h!=null){hd=h;meRender();}}
document.getElementById('loc').onclick=function(){
 if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
  DeviceOrientationEvent.requestPermission().then(function(p){if(p==='granted')window.addEventListener('deviceorientation',onOri,true);}).catch(function(){});}
 else if(window.DeviceOrientationEvent){window.addEventListener('deviceorientationabsolute',onOri,true);window.addEventListener('deviceorientation',onOri,true);}
 if(!navigator.geolocation){alert('此裝置不支援定位');return;}
 if(!watching){watching=true;
  navigator.geolocation.watchPosition(function(p){meLL=[p.coords.latitude,p.coords.longitude];
   if(hd==null&&p.coords.heading!=null&&!isNaN(p.coords.heading))hd=p.coords.heading;
   if(!meM)map.setView(meLL,16);meRender();},
   function(){alert('無法定位：請在 Safari 允許位置權限');},{enableHighAccuracy:true,maximumAge:1000,timeout:12000});}
 else if(meLL){map.setView(meLL,16);}};
